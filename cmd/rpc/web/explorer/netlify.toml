[build]
  base = "cmd/rpc/web/explorer"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  VITE_NODE_ENV = "production"

# RPC/Admin proxy routes (same-origin) to avoid browser CORS issues
[[redirects]]
  from = "/rpc-node1/*"
  to = "https://node1.canopy.us.nodefleet.net/rpc/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin-node1/*"
  to = "https://node1.canopy.us.nodefleet.net/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/rpc-node2/*"
  to = "https://node2.canopy.us.nodefleet.net/rpc/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin-node2/*"
  to = "https://node2.canopy.us.nodefleet.net/admin/:splat"
  status = 200
  force = true

# Redirects for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"